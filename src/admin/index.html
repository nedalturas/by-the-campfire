<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager - By the Campfire</title>
  <!-- Include the script that enables Netlify Identity on this page. -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>

<body>
  <!-- Include the script that builds the page and powers Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.1.0/dist/decap-cms.js"></script>

  <script>
    CMS.registerEventListener({
      name: 'preSave',
      handler: ({ entry }) => {
        console.log("preSave triggered");

        const user = window.netlifyIdentity && window.netlifyIdentity.currentUser();
        console.log("user:", user);

        if (user) {
          const metadata = user.user_metadata || {};
          const name = metadata.full_name || metadata.name || user.email;

          return entry.get('data').set('author', name);
        }

        return entry;
      }
    });
  </script>
</body>

</html>
